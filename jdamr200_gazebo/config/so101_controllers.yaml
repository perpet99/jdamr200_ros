controller_manager:
  ros__parameters:
    update_rate: 100 # Hz
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    so101_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

so101_arm_controller:
  ros__parameters:
    joints:
      - so101_shoulder_pan
      - so101_shoulder_lift
      - so101_elbow_flex
      - so101_wrist_flex
      - so101_wrist_roll
      - so101_gripper
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: true
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0
